name: Bug report
description: Report a reproducible SDK issue
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: sdk_version
    attributes:
      label: SDK version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      description: Browser, React Native, Node, etc.
      placeholder: React Native (Expo)
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal reproducible steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
