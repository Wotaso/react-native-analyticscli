name: Release to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Resolve release metadata
        id: release_meta
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" == v* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="v${version}"
          fi

          if [[ "${version}" == *-* ]]; then
            dist_tag="preview"
            prerelease="true"
          else
            dist_tag="latest"
            prerelease="false"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "dist_tag=${dist_tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Ensure tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          expected="${GITHUB_REF_NAME#v}"
          actual="${{ steps.release_meta.outputs.version }}"
          if [[ "${expected}" != "${actual}" ]]; then
            echo "Tag version (${expected}) does not match package.json version (${actual})." >&2
            exit 1
          fi

      - name: Run quality checks
        run: npm run quality

      - name: Check whether npm version already exists
        id: npm_version_check
        run: |
          version="${{ steps.release_meta.outputs.version }}"
          if npm view "@analyticscli/sdk@${version}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "already_published=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish package (idempotent)
        id: publish_step
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ "${{ steps.npm_version_check.outputs.already_published }}" == "true" ]]; then
            echo "Version ${{ steps.release_meta.outputs.version }} already exists on npm; skipping publish."
            echo "already_published=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          publish_output="$(mktemp)"
          set +e
          npm publish --access public --tag "${{ steps.release_meta.outputs.dist_tag }}" 2>&1 | tee "${publish_output}"
          publish_exit=$?
          set -e

          if [[ ${publish_exit} -eq 0 ]]; then
            echo "already_published=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if grep -Fq "You cannot publish over the previously published versions" "${publish_output}"; then
            echo "Version ${{ steps.release_meta.outputs.version }} became already published while workflow was running; continuing."
            echo "already_published=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          exit "${publish_exit}"

      - name: Enforce npm dist-tag policy
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: '@analyticscli/sdk'
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
          RELEASE_IS_PRERELEASE: ${{ steps.release_meta.outputs.prerelease }}
        run: |
          expected_latest=""

          if [[ "${RELEASE_IS_PRERELEASE}" == "true" ]]; then
            npm dist-tag add "${PACKAGE_NAME}@${RELEASE_VERSION}" preview

            latest_stable="$(
              npm view "${PACKAGE_NAME}" versions --json \
                | node -e "
                    let input = '';
                    process.stdin.on('data', (chunk) => (input += chunk));
                    process.stdin.on('end', () => {
                      const versions = JSON.parse(input);
                      const list = (Array.isArray(versions) ? versions : [versions]).filter(
                        (version) => typeof version === 'string' && !version.includes('-')
                      );
                      list.sort((a, b) => {
                        const pa = a.split('.').map((n) => Number.parseInt(n, 10));
                        const pb = b.split('.').map((n) => Number.parseInt(n, 10));
                        for (let i = 0; i < 3; i += 1) {
                          const diff = (pa[i] || 0) - (pb[i] || 0);
                          if (diff !== 0) return diff;
                        }
                        return 0;
                      });
                      process.stdout.write(list[list.length - 1] ?? '');
                    });
                  "
            )"

            if [[ -n "${latest_stable}" ]]; then
              npm dist-tag add "${PACKAGE_NAME}@${latest_stable}" latest
              expected_latest="${latest_stable}"
              echo "Pinned latest dist-tag to stable version ${latest_stable}."
            else
              npm dist-tag add "${PACKAGE_NAME}@${RELEASE_VERSION}" latest
              expected_latest="${RELEASE_VERSION}"
              echo "No stable version exists yet; latest points to prerelease ${RELEASE_VERSION}."
            fi
          else
            npm dist-tag add "${PACKAGE_NAME}@${RELEASE_VERSION}" latest
            expected_latest="${RELEASE_VERSION}"
          fi

          effective_latest="$(npm view "${PACKAGE_NAME}" dist-tags.latest --json 2>/dev/null || true)"
          effective_latest="${effective_latest//\"/}"

          if [[ -z "${expected_latest}" ]]; then
            echo "Dist-tag policy error: expected_latest was not computed." >&2
            exit 1
          fi

          if [[ "${effective_latest}" != "${expected_latest}" ]]; then
            echo "Dist-tag policy violation: latest=${effective_latest}, expected=${expected_latest}." >&2
            exit 1
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
          RELEASE_DIST_TAG: ${{ steps.release_meta.outputs.dist_tag }}
          RELEASE_IS_PRERELEASE: ${{ steps.release_meta.outputs.prerelease }}
          RELEASE_ALREADY_PUBLISHED: ${{ steps.publish_step.outputs.already_published }}
          RELEASE_COMMIT: ${{ github.sha }}
        run: |
          notes_file="$(mktemp)"
          npm_url="https://www.npmjs.com/package/@analyticscli/sdk/v/${RELEASE_VERSION}"
          {
            echo "Published to npm as [@analyticscli/sdk@${RELEASE_VERSION}](${npm_url})."
            echo
            echo "npm dist-tag: \`${RELEASE_DIST_TAG}\`."
            if [[ "${RELEASE_ALREADY_PUBLISHED}" == "true" ]]; then
              echo
              echo "Publish step was skipped because this version was already present on npm."
            fi
          } > "${notes_file}"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            edit_args=(release edit "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes-file "${notes_file}")
            if [[ "${RELEASE_IS_PRERELEASE}" == "true" ]]; then
              edit_args+=(--prerelease)
            fi
            gh "${edit_args[@]}"
          else
            create_args=(release create "${RELEASE_TAG}" --target "${RELEASE_COMMIT}" --title "${RELEASE_TAG}" --notes-file "${notes_file}")
            if [[ "${RELEASE_IS_PRERELEASE}" == "true" ]]; then
              create_args+=(--prerelease)
            fi
            gh "${create_args[@]}"
          fi
